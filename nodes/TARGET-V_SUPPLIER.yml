    sourceMapping:
      - aliases:
          DIM_SUPPLIER: e525726e-2165-4851-a7e9-a310f861c70f
        customSQL:
          customSQL: |-
            {{ stage('Override Create SQL') }}
             
            CREATE OR REPLACE VIEW {{ ref('TARGET', 'V_SUPPLIER') }} AS (
             
            WITH FilteredSuppliers AS (
             
                SELECT *
                FROM {{ ref('TARGET', 'DIM_SUPPLIER') }}
                WHERE "S_ACCTBAL" > 0   -- Filter suppliers with positive account balance
             
            ),
             
            EnhancedSuppliers AS (
             
                SELECT
                    "DIM_SUPPLIER_KEY",
                    "S_SUPPKEY",
                    "S_NAME",
                    "S_ADDRESS",
                    "S_NATIONKEY",
                    "S_PHONE",
                    "S_ACCTBAL",
                    "S_COMMENT",
                    "SYSTEM_VERSION",
                    "SYSTEM_CURRENT_FLAG",
                    "SYSTEM_START_DATE",
                    "SYSTEM_END_DATE",
                    "SYSTEM_CREATE_DATE",
                    "SYSTEM_UPDATE_DATE",
             
                    CASE
                        WHEN "S_ACCTBAL" > 10000 THEN 'HIGH_BALANCE'
                        WHEN "S_ACCTBAL" BETWEEN 5000 AND 10000 THEN 'MEDIUM_BALANCE'
                        ELSE 'LOW_BALANCE'
                    END AS "BALANCE_CATEGORY"   -- Classify suppliers by account balance
             
                FROM FilteredSuppliers
             
            )
             
            SELECT *
            FROM EnhancedSuppliers
             
            );
        dependencies:
          - locationName: TARGET
            nodeName: DIM_SUPPLIER
        join:
          joinCondition: FROM {{ ref('TARGET', 'DIM_SUPPLIER') }} "DIM_SUPPLIER"
        name: V_SUPPLIER
        noLinkRefs: []
